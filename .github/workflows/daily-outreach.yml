name: LE Daily Outreach
on:
  schedule:
    - cron: '0 13 * * 2-4'  # 6am PT / 10am BRT, Tue-Wed-Thu
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Write Gmail credentials
        env:
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: |
          echo "$TOKEN_JSON" | base64 -d > token.json
          echo "$CREDENTIALS_JSON" > credentials.json

      - name: Debug token
        env:
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: |
          echo "Token length: ${#TOKEN_JSON}"
          echo "$TOKEN_JSON" | base64 -d | head -c 50

      - name: Run outreach agent
        run: python run.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      
